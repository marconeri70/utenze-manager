<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gestione Utenze</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Gestione Utenze</h1>

<p>Bollette • Autoletture • Archivio PDF</p>

</header>

<nav>

<button onclick="showSection('dashboard')">Dashboard</button>

<button onclick="showSection('utenze')">Utenze</button>

<button onclick="showSection('fatture')">Fatture</button>

<button onclick="showSection('autoletture')">Autoletture</button>

<button onclick="showSection('archivio')">Archivio</button>

</nav>

<section id="dashboard">

<h2>Scadenze</h2>

<div id="scadenze"></div>

<h2>Autoletture prossime</h2>

<div id="autolettureProssime"></div>

</section>

<section id="utenze" class="hidden">

<h2>Nuova Utenza</h2>

<input id="nomeUtenza" placeholder="Nome fornitore">

<input id="tipoUtenza" placeholder="Tipo (luce, gas, acqua)">

<button onclick="addUtenza()">Salva</button>

<ul id="listaUtenze"></ul>

</section>

<section id="fatture" class="hidden">

<h2>Nuova Fattura</h2>

<input id="fornitore" placeholder="Fornitore">

<input type="date" id="scadenza">

<input id="importo" placeholder="Importo">

<input id="numeroFattura" placeholder="Numero fattura">

<input type="file" id="pdf" accept="application/pdf">

<button onclick="leggiPDF()">Importa dati da PDF</button>

<button onclick="addFattura()">Salva fattura</button>

</section>

<section id="autoletture" class="hidden">

<h2>Autolettura contatore</h2>

<input id="contatore" placeholder="Contatore (gas, luce...)">

<input type="date" id="dataAutolettura">

<button onclick="addAutolettura()">Salva</button>

<ul id="listaAutoletture"></ul>

</section>

<section id="archivio" class="hidden">

<h2>Archivio fatture</h2>

<ul id="listaFatture"></ul>

</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script src="app.js"></script>

</body>

</html>
